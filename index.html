<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Судейская Панель</title>
    
    <!-- PWA Настройки -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1088/1088537.png">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            background: #ffffff; 
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* Стили для плавного появления контента */
        #main-content {
            opacity: 0;
            transition: opacity 0.8s ease;
            width: 100%;
            height: 100%;
        }

        .app-loaded #main-content {
            opacity: 1;
        }

        /* Скрытие прелоадера */
        .app-loaded #preloader { 
            opacity: 0 !important; 
            pointer-events: none !important; 
        }
    </style>
</head>
<body>
    <!-- Контейнер для прелоадера -->
    <div id="preloader-placeholder"></div>

    <!-- Контейнер, куда мы загрузим judging.html -->
    <div id="main-content"></div>

    <script>
        // 1. Сначала загружаем прелоадер
        fetch('preloader.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('preloader-placeholder').innerHTML = html;
            });

        // 2. Загружаем основное приложение (judging.html)
        // Мы используем iframe или fetch. Fetch лучше для PWA, чтобы сохранить единое окно.
        fetch('judging.html')
            .then(response => response.text())
            .then(html => {
                const content = document.getElementById('main-content');
                content.innerHTML = html;

                // Выполняем скрипты из загруженного файла вручную, 
                // так как innerHTML не исполняет <script> автоматически
                const scripts = content.getElementsByTagName('script');
                for (let i = 0; i < scripts.length; i++) {
                    const script = document.createElement('script');
                    if (scripts[i].src) {
                        script.src = scripts[i].src;
                    } else {
                        script.textContent = scripts[i].textContent;
                    }
                    document.body.appendChild(script);
                }

                // Сигнализируем о готовности (в judging.html должен быть вызов этого события или таймер)
                // Если в judging.html нет dispatchEvent, сработает этот запасной вариант:
                setTimeout(() => {
                    document.documentElement.classList.add('app-loaded');
                }, 1500);
            })
            .catch(err => {
                console.error('Ошибка загрузки приложения:', err);
                document.body.innerHTML = 'Ошибка загрузки приложения. Проверьте наличие файла judging.html';
            });

        // Слушаем событие готовности, если оно придет из скриптов judging.html
        window.addEventListener('app-ready', () => {
            document.documentElement.classList.add('app-loaded');
        });
    </script>

    <!-- Регистрация Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(console.error);
            });
        }
    </script>
</body>
</html>
