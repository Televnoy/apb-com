<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Судейская Панель</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1088/1088537.png">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body, html { margin: 0; padding: 0; background: #ffffff; }
        
        /* Preloader Styles */
        #preloader {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loaded #preloader { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-family: 'Inter', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 2px;">Загрузка системы...</p>
    </div>

    <div id="root"></div>

    <!-- Load React and App Script -->
    <script type="text/babel" src="app.jsx"></script>

    <!-- PWA Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered'))
                    .catch(err => console.log('SW Failed', err));
            });
        }
        
        // Hide preloader when app is ready
        window.addEventListener('app-ready', () => {
            document.body.classList.add('loaded');
        });
    </script>
    
    <!-- Babel for JSX support in browser (for dev/demo) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- React & Lucide icons will be handled inside app.jsx via imports or CDNs -->
</body>
</html>
