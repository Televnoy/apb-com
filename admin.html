<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APB | Admin Panel</title>
    <link rel="manifest" href="admin.manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #0a0a0a; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: #141414; border: 1px solid #262626; }
        .btn-primary { background: #ffffff; color: #000000; transition: all 0.2s; }
        .btn-primary:hover { background: #d1d1d1; transform: translateY(-1px); }
        /* Кастомный скроллбар в стиле APB */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="border-b border-white/10 py-4 px-6 flex justify-between items-center bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-sm font-bold tracking-widest uppercase">APB Admin <span class="text-white/40 font-normal">v2.0</span></h1>
        </div>
        <div class="flex gap-4">
            <button onclick="fetchData()" class="p-2 hover:bg-white/5 rounded-full transition-colors">
                <i data-lucide="refresh-cw" class="w-4 h-4 text-white/60"></i>
            </button>
            <button onclick="clearDatabase()" class="text-[10px] font-bold text-red-500/70 hover:text-red-500 uppercase tracking-tighter transition-colors">
                Wipe Data
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-[1400px] mx-auto w-full p-4 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-3 space-y-6">
            <div class="card rounded-xl overflow-hidden">
                <div class="p-4 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-white/50">Live Feed</h2>
                    <span id="last-update" class="text-[10px] mono text-white/20">Updated: --:--:--</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] uppercase tracking-widest text-white/40 border-b border-white/5">
                                <th class="px-6 py-4">ID / Participant</th>
                                <th class="px-6 py-4">Judge</th>
                                <th class="px-6 py-4">City</th>
                                <th class="px-6 py-4">Score</th>
                                <th class="px-6 py-4">Rank</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="live-table-body" class="text-[13px] divide-y divide-white/[0.02]">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="card rounded-2xl p-5 bg-gradient-to-b from-[#1a1a1a] to-[#141414]">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="brain-circuit" class="w-4 h-4 text-blue-400"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">AI Intelligence</span>
                </div>
                <div id="ai-response" class="text-xs text-white/60 leading-relaxed mb-4 min-h-[80px] italic">
                    Ожидание запроса...
                </div>
                <textarea id="ai-prompt" 
                    class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-blue-500/50 transition-all resize-none" 
                    rows="3" 
                    placeholder="Анализ по городам..."></textarea>
                <button onclick="askAI()" class="mt-3 w-full btn-primary py-2.5 rounded-lg text-[10px] font-bold uppercase tracking-widest">
                    Process
                </button>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="card rounded-2xl p-5">
                    <div class="text-[10px] text-white/30 uppercase mb-2">Total Reports</div>
                    <div id="count-reports" class="text-3xl font-bold mono tracking-tighter text-white">0</div>
                </div>
                <div class="card rounded-2xl p-5">
                    <div class="text-[10px] text-white/30 uppercase mb-2">Average Score</div>
                    <div id="avg-score" class="text-3xl font-bold mono tracking-tighter text-blue-400">0.0</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Регистрация PWA Admin
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('admin.sw.js')
                .then(() => console.log("Admin PWA Active"));
        }

        lucide.createIcons();

        async function fetchData() {
            try {
                const response = await fetch('get_data.php');
                const data = await response.json();
                renderTable(data);
                document.getElementById('last-update').innerText = `Updated: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.warn("Using offline/demo data");
                // Demo data for preview
                renderTable([
                    {id: 1, participant_number: "089", judge_name: "Smith", city: "Moscow", score: 9.8, place: 1},
                    {id: 2, participant_number: "042", judge_name: "Brown", city: "Perm", score: 8.5, place: 2}
                ]);
            }
        }

        function renderTable(data) {
            const body = document.getElementById('live-table-body');
            let totalScore = 0;
            
            body.innerHTML = data.map(row => {
                totalScore += parseFloat(row.score);
                return `
                <tr class="hover:bg-white/[0.02] transition-colors group">
                    <td class="px-6 py-4">
                        <div class="font-bold text-white">#${row.participant_number}</div>
                        <div class="text-[10px] text-white/30">ID: ${row.id}</div>
                    </td>
                    <td class="px-6 py-4 text-white/70">${row.judge_name}</td>
                    <td class="px-6 py-4 text-white/50">${row.city}</td>
                    <td class="px-6 py-4 mono font-bold text-blue-400 text-lg">${row.score}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-0.5 border border-white/10 rounded-full text-[9px] uppercase font-bold">
                            Rank ${row.place}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                        <button class="text-white/20 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>`;
            }).join('');
            
            document.getElementById('count-reports').innerText = data.length;
            document.getElementById('avg-score').innerText = data.length ? (totalScore / data.length).toFixed(1) : 0;
            lucide.createIcons();
        }

        async function askAI() {
            const resDiv = document.getElementById('ai-response');
            resDiv.innerText = "Analyzing streams...";
            setTimeout(() => {
                resDiv.innerText = "Анализ завершен: Лидирует сектор 089. В Перми средний балл на 12% ниже ожидаемого.";
            }, 1000);
        }

        setInterval(fetchData, 15000);
        fetchData();
    </script>
</body>
</html>
